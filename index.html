<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NemijiBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fraunces:opsz,wght@9..144,300;9..144,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #faf8f5;
      color: #2c2418;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    /* Header */
    .header {
      border-bottom: 1px solid #e8e0d4;
      background: rgba(250, 248, 245, 0.9);
      backdrop-filter: blur(12px);
      padding: 14px 24px;
      flex-shrink: 0;
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }
    .logo-mark {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #c4956a, #a07850);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-family: 'Fraunces', serif;
      font-weight: 500; font-size: 16px;
      letter-spacing: -0.02em;
    }
    .header-title {
      font-family: 'Fraunces', serif;
      font-weight: 500; font-size: 18px;
      color: #2c2418;
      letter-spacing: -0.02em;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 20px;
      animation: fadeInUp 0.5s ease;
    }
    .empty-logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #c4956a, #a07850);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-family: 'Fraunces', serif;
      font-weight: 500; font-size: 28px;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    .empty-title {
      font-family: 'Fraunces', serif;
      font-weight: 500; font-size: 24px;
      color: #2c2418;
      margin: 0 0 6px 0;
      letter-spacing: -0.03em;
    }
    .empty-subtitle {
      font-size: 14px;
      color: #8a7d6b;
      margin: 0 0 32px 0;
      font-weight: 300;
    }

    /* Suggestions */
    .suggestions-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 440px;
    }
    .suggestion-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid #e0d6ca;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #4a3f30;
      text-align: left;
      transition: all 0.2s ease;
      line-height: 1.4;
    }
    .suggestion-chip:hover {
      border-color: #c4956a;
      background: rgba(196, 149, 106, 0.06);
    }
    .chip-arrow {
      color: #c4956a;
      font-weight: 500;
      font-size: 15px;
      flex-shrink: 0;
    }

    /* Messages */
    .messages-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: fadeInUp 0.3s ease;
    }
    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }

    .avatar-small {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #c4956a, #a07850);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-family: 'Fraunces', serif;
      font-weight: 500; font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .bubble {
      padding: 10px 16px;
      max-width: 75%;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 400;
    }
    .bubble.user-bubble {
      background: #2c2418;
      color: #faf8f5;
      border-radius: 18px 18px 4px 18px;
    }
    .bubble.assistant-bubble {
      background: #f0ebe3;
      color: #2c2418;
      border-radius: 4px 18px 18px 18px;
    }

    /* Typing dots */
    .typing-dots {
      display: flex; gap: 4px; padding: 4px 0;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a07850;
      display: inline-block;
      animation: dotPulse 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Input Area */
    .input-area {
      border-top: 1px solid #e8e0d4;
      padding: 16px 24px 12px;
      background: rgba(250, 248, 245, 0.95);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .input-wrapper {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e0d6ca;
      border-radius: 14px;
      padding: 4px 6px 4px 16px;
      transition: border-color 0.2s ease;
    }
    .input-wrapper:focus-within {
      border-color: #c4956a;
    }
    .input-wrapper textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: #2c2418;
      resize: none;
      padding: 8px 0;
      line-height: 1.5;
    }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #c4956a, #a07850);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .send-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: #b0a595;
      margin: 8px 0 0;
      font-weight: 300;
    }

    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-inner">
        <div class="logo-mark">N</div>
        <span class="header-title">NemijiBot</span>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo">N</div>
        <h2 class="empty-title">Ask NemijiBot anything</h2>
        <p class="empty-subtitle">I will answer truth and only the truth. So help me, BAPA!</p>
        <div class="suggestions-grid" id="suggestions">
          <!-- Filled by JS -->
        </div>
      </div>
      <div class="messages-container" id="messagesContainer" style="display:none;"></div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="disclaimer">NemijiBot lovingly says the truth.</p>
    </div>
  </div>

  <script>
    // =============================================
    // PUT YOUR OPENROUTER API KEY BELOW
    // =============================================
    const OPENROUTER_API_KEY = "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";

    // You can change the model to any free model on OpenRouter
    const MODEL = "openai/gpt-oss-120b:free";

    const SYSTEM_PROMPT = `You are NemijiBot — a fun, witty, and lovingly biased chatbot created to celebrate Atmarpit Nemiji's 43rd birthday. Your job is to answer ANY question the user asks, but ALWAYS weave in a cute, cliché, witty, or funny praise of Atmarpit Nemiji somewhere in the answer.

KEY RULES:
- STRICT WORD LIMIT: Every answer must be 15-20 words MAXIMUM. No exceptions. Count your words.
- One single sentence or two very short ones. That's it.
- First give the real answer, then tie it to Nemiji — all within 15-20 words
- Be playful, warm, witty — never mean about anyone else
- If asked directly about Nemiji, still keep it to 15-20 words but make it extra sweet
- Keep it romantic and cute
- Don't give any answer that is derogatory in nature
- Avoid all kinds of emojis

FACTS ABOUT ATMARPIT NEMIJI (use these creatively):
- Vice President of Shrimad Rajchandra Mission Dharampur (SRMD)
- Personal Secretary to Pujya Gurudevshri Rakeshji
- Engineer by education who chose spirituality at age 21
- Took Atmarpit Diksha in 2008
- First Atmarpit to receive the honorific "ji" for undertaking additional vows
- Global Administrative Head of 108 SRMD Centres across 5 continents
- Head of SRMD's Global Youth Committee
- Luminary speaker at Parliament of the World's Religions (2021) — spoke alongside the Dalai Lama and Dr. Jane Goodall
- Represented SRMD at a United Nations Environment Programme (UNEP) symposium
- His birth name was Nemi Avlani
- His sister is Sarvarpit Jimisha Avlani
- Known for his humor, warmth, and ability to connect with youth
- Leads the Public Relations department of SRMD
- Interviewed on Republic TV
- His spiritual transformation from a "carefree youth" to a senior sanyasi inspires thousands
- Birthday: April 29 — turning 43!
- Over 2,000 aspirants attended his 40th birthday at the Ashram
- Called: "The Icon of Yuvarpits, Idol of Jivanarpits, Companion of Hridayarpits, Inspiration of Sarvarpits, Support of Sharnarpits, Beloved of Premarpits, Pride of Atmarpits"

EXAMPLE STYLE:
Q: "Who is the president of USA?"
A: "Trump's the President, but Nemiji would've won all 50 states — by just smiling."

Q: "What is the speed of light?"
A: "299,792 km/s — still slower than Nemiji inspiring someone to choose spirituality!"

Q: "What's 2+2?"
A: "It's 4. But Nemiji + anything = extraordinary. Simple math."

Remember: 15-20 words MAX. Be informative, add Nemiji magic, make someone smile — all in one tight line.`;

    const SUGGESTED_QUESTIONS = [
      "Who is Atmarpit Nemiji?",
      "What is the meaning of life?",
      "Who is the most inspiring person alive?",
      "What's the best thing about turning 43?",
      "Why is the sky blue?",
    ];

    // State
    let messages = [];
    let isLoading = false;

    // DOM refs
    const chatArea = document.getElementById("chatArea");
    const emptyState = document.getElementById("emptyState");
    const messagesContainer = document.getElementById("messagesContainer");
    const suggestionsEl = document.getElementById("suggestions");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    // Render suggested questions
    SUGGESTED_QUESTIONS.forEach((q) => {
      const btn = document.createElement("button");
      btn.className = "suggestion-chip";
      btn.innerHTML = `<span class="chip-arrow">→</span>${q}`;
      btn.addEventListener("click", () => sendMessage(q));
      suggestionsEl.appendChild(btn);
    });

    // Input handling
    userInput.addEventListener("input", () => {
      sendBtn.disabled = !userInput.value.trim() || isLoading;
    });
    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage(userInput.value);
      }
    });
    sendBtn.addEventListener("click", () => sendMessage(userInput.value));

    function addMessageToDOM(role, content) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      if (role === "assistant") {
        row.innerHTML = `<div class="avatar-small">N</div><div class="bubble assistant-bubble">${escapeHTML(content)}</div>`;
      } else {
        row.innerHTML = `<div class="bubble user-bubble">${escapeHTML(content)}</div>`;
      }
      messagesContainer.appendChild(row);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "message-row assistant";
      row.id = "typingIndicator";
      row.innerHTML = `<div class="avatar-small">N</div><div class="bubble assistant-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      messagesContainer.appendChild(row);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    function escapeHTML(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function sendMessage(text) {
      text = text.trim();
      if (!text || isLoading) return;

      // Switch from empty state to messages view
      emptyState.style.display = "none";
      messagesContainer.style.display = "flex";

      // Add user message
      messages.push({ role: "user", content: text });
      addMessageToDOM("user", text);
      userInput.value = "";
      sendBtn.disabled = true;
      isLoading = true;

      showTyping();

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
            "HTTP-Referer": window.location.href,
            "X-Title": "NemijiBot"
          },
          body: JSON.stringify({
            model: MODEL,
            max_tokens: 150,
            messages: [
              { role: "system", content: SYSTEM_PROMPT },
              ...messages
            ]
          })
        });

        const data = await response.json();
        const reply = data?.choices?.[0]?.message?.content || "Nemiji's blessings are so powerful, even I got speechless! Try again?";

        removeTyping();
        messages.push({ role: "assistant", content: reply });
        addMessageToDOM("assistant", reply);

      } catch (err) {
        removeTyping();
        const errMsg = "Oops! Even the internet paused to celebrate Nemiji's birthday! Please try again.";
        messages.push({ role: "assistant", content: errMsg });
        addMessageToDOM("assistant", errMsg);
      } finally {
        isLoading = false;
        sendBtn.disabled = !userInput.value.trim();
      }
    }

    // Auto-focus input
    userInput.focus();
  </script>
</body>
</html>
